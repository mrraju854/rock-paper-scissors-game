<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rock Paper Scissors</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
<script src="https://kit.fontawesome.com/2c6133bcaa.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<span class="navbar-brand mb-0 h1 bold">Rock Paper Scissors</span>
</nav>

<div class="text-center mt-3">
<h1>WELCOME TO ROCK PAPER SCISSORS GAME!</h1>
</div>

<div id="message" class="text-center h5"></div>

<div class="text-center m-5" id="start">
<input type="submit" id="submit" class="btn btn-dark bold" value="Get Started!">
</div>

<div id="boards" class="boards">

<div class="row">

<div class="col-6 text-center">
<h1 class="text-center my-3">Player</h1>

<div id="playerSide">
<h3 id="playerScore"></h3>
<div id="playerSelect"></div>
</div>

</div>

<div class="col-6 text-center">
<h1 class="text-center my-3">Computer</h1>

<div id="computerSide">
<h3 id="computerScore"></h3>
<div id="computerSelect"></div>
</div>

</div>

</div>

</div>

<div id="select" class="text-center w-50 mx-auto my-3 select">

<div class="row">

<div id="rock" class="col-4 clickable-icon">
<i class="fas fa-hand-rock"></i>
</div>

<div id="paper" class="col-4 clickable-icon">
<i class="fas fa-hand-paper"></i>
</div>

<div id="scissors" class="col-4 clickable-icon">
<i class="fas fa-hand-scissors"></i>
</div>

</div>

</div>

<footer class="bg-dark">
<p>Rock Paper Scissors Game</p>
</footer>

<script src="script.js"></script>

</body>
</html>
